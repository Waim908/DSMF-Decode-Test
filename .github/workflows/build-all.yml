name: Build All

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'

jobs:
  msvc-build:
    runs-on: windows-2025-vs2026
    strategy:
      matrix:
        arch: [amd64, x86]
    steps:
      - name: Configure build for ${{ matrix.arch }}
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Build DSMF-Decode-Test
        run: |
          chcp 65001
          pushd C:\
          git clone -b ${{ github.event.inputs.branch }} --depth=1 https://github.com/Waim908/DSMF-Decode-Test.git
          cd DSMF-Decode-Test
          if ("${{ matrix.arch }}" -eq "x86") {
            .\build.bat ARCH=32
          } else {
            .\build.bat ARCH=64
          }

      - name: Upload EXE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DSMF-Decode-Test-EXEs-${{ matrix.arch }}
          path: C:\DSMF-Decode-Test\*.exe

  mingw64-build:
    runs-on: windows-2025-vs2026
    steps:
      - name: Setup MSYS2 with MinGW-w64 and make
        uses: msys2/setup-msys2@v2
        with:
          install: mingw-w64-x86_64-gcc make
          msystem: MINGW64
          update: true

      - name: Clone repository
        shell: msys2 {0}
        run: |
          git clone -b ${{ github.event.inputs.branch }} --depth=1 https://github.com/Waim908/DSMF-Decode-Test.git /c/DSMF-Decode-Test

      - name: Build for x86_64 (64-bit)
        shell: msys2 {0}
        run: |
          cd /c/DSMF-Decode-Test
          make ARCH=64 -j$(nproc)
          mkdir -p /c/artifacts/mingw64/x64
          cp *.exe /c/artifacts/mingw64/x64/ || true

      - name: Build for i686 (32-bit)
        shell: msys2 {0}
        run: |
          cd /c/DSMF-Decode-Test
          # make clean
          make ARCH=32 -j$(nproc)
          mkdir -p /c/artifacts/mingw64/x86
          cp *.exe /c/artifacts/mingw64/x86/ || true

      - name: Upload EXE artifacts (MinGW-w64 x64)
        uses: actions/upload-artifact@v4
        with:
          name: DSMF-Decode-Test-EXEs-mingw64-x64
          path: C:\artifacts\mingw64\x64\*.exe

      - name: Upload EXE artifacts (MinGW-w64 x86)
        uses: actions/upload-artifact@v4
        with:
          name: DSMF-Decode-Test-EXEs-mingw64-x86
          path: C:\artifacts\mingw64\x86\*.exe