name: Build All

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'

jobs:
  msvc-build:
    runs-on: windows-2025-vs2026
    strategy:
      matrix:
        arch: [amd64, x86]
    steps:
      - name: Configure build for ${{ matrix.arch }}
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Build DSMF-Decode-Test
        run: |
          chcp 65001
          pushd C:\
          git clone -b ${{ github.event.inputs.branch }} --depth=1 https://github.com/Waim908/DSMF-Decode-Test.git
          cd DSMF-Decode-Test
          if ("${{ matrix.arch }}" -eq "x86") {
            .\build.bat ARCH=32
          } else {
            .\build.bat ARCH=64
          }

      - name: Upload EXE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DSMF-Decode-Test-EXEs-${{ matrix.arch }}
          path: C:\DSMF-Decode-Test\*.exe

  mingw64-build:
    runs-on: ubuntu-26.04
    steps:
      - name: install MinGW-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Clone repository
        run: |
          cd /tmp
          git clone -b ${{ github.event.inputs.branch }} --depth=1 https://github.com/Waim908/DSMF-Decode-Test.git

      - name: Build for x86_64 (64-bit)
        run: |
          mkdir /tmp/x64-build
          cd /tmp/DSMF-Decode-Test
          make ARCH=64 -j$(nproc) || exit 1
          mv *.exe /tmp/x64-build/

      - name: Build for i686 (32-bit)
        run: |
          mkdir /tmp/x86-build
          cd /tmp/DSMF-Decode-Test
          # make clean
          make ARCH=32 -j$(nproc) || exit 1
          mv *.exe /tmp/x86-build/

      - name: Upload EXE artifacts (MinGW-w64 x64)
        uses: actions/upload-artifact@v4
        with:
          name: DSMF-Decode-Test-EXEs-mingw64-x64
          path: /tmp/x64-build/*.exe

      - name: Upload EXE artifacts (MinGW-w64 x86)
        uses: actions/upload-artifact@v4
        with:
          name: DSMF-Decode-Test-EXEs-mingw64-x86
          path: /tmp/x86-build/*.exe

