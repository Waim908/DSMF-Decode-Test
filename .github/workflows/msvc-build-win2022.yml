name: Build DSMF-Decode-Test on MSVC Toolchain (Win2022)

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'
      arch:
        description: 'Target architecture'
        required: true
        default: 'amd64'
        type: choice
        options:
          - amd64
          - x86

jobs:
  msvc-build:
    runs-on: windows-2022
    steps:
      - name: Configure build for ${{ github.event.inputs.arch }}
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ github.event.inputs.arch }}
      
      - name: Build DSMF-Decode-Test
        run: |
          chcp 65001
          pushd C:\
          git clone -b ${{ github.event.inputs.branch }} --depth=1 https://github.com/Waim908/DSMF-Decode-Test.git
          cd DSMF-Decode-Test
          if ("${{ github.event.inputs.arch }}" -eq "x86") {
            .\build.bat ARCH=32
          } else {
            .\build.bat ARCH=64
          }

      - name: Upload EXE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DSMF-Decode-Test-EXEs-${{ github.event.inputs.arch }}
          path: C:\DSMF-Decode-Test\*.exe
